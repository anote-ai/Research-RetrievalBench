<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">RetrievalBench experiment design</title>
  <desc id="desc">Twelve domains flow through four chunking strategies and three embedding models into retrieval evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1090" cy="80" r="210" fill="#2563eb" opacity="0.10"/>
  <circle cx="90" cy="590" r="240" fill="#7c3aed" opacity="0.10"/>
  <text x="72" y="96" fill="#e2e8f0" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="600" letter-spacing="3">RETRIEVALBENCH</text>
  <text x="72" y="166" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="700">Chunking is part of</text>
  <text x="72" y="226" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="700">the retrieval system.</text>
  <text x="74" y="273" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="22">A controlled cross-domain sensitivity study</text>

  <g filter="url(#shadow)">
    <rect x="72" y="338" width="280" height="174" rx="22" fill="#111c31" stroke="#334155"/>
    <text x="98" y="382" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600">DOMAINS</text>
    <text x="98" y="454" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="700">12</text>
    <text x="190" y="444" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">finance · legal</text>
    <text x="190" y="470" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">science · QA · more</text>

    <rect x="460" y="338" width="280" height="174" rx="22" fill="#111c31" stroke="#334155"/>
    <text x="486" y="382" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600">CHUNKERS</text>
    <text x="486" y="454" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="700">4</text>
    <text x="555" y="430" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">fixed · sentence</text>
    <text x="555" y="456" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">recursive · semantic</text>

    <rect x="848" y="338" width="280" height="174" rx="22" fill="#111c31" stroke="#334155"/>
    <text x="874" y="382" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600">EMBEDDERS</text>
    <text x="874" y="454" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="700">3</text>
    <text x="943" y="430" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">OpenAI · BGE</text>
    <text x="943" y="456" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="18">E5</text>
  </g>
  <path d="M352 425 H447" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M740 425 H835" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M438 413 L452 425 L438 437" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M826 413 L840 425 L826 437" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="72" y="557" width="520" height="4" rx="2" fill="url(#accent)"/>
  <text x="72" y="594" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="19">Up to 47% relative NDCG@10 change from chunking alone</text>
</svg>

