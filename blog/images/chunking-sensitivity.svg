<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">NDCG range across chunking strategies</title>
  <desc id="desc">Range plots for selected domain and retriever pairs show the minimum and maximum NDCG at 10 caused by changing the chunking strategy.</desc>
  <rect width="1200" height="720" rx="24" fill="#f8fafc"/>
  <text x="70" y="70" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">Same retriever. Same corpus. Different chunker.</text>
  <text x="70" y="108" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">Observed NDCG@10 range across four chunking strategies</text>

  <line x1="390" y1="150" x2="1100" y2="150" stroke="#cbd5e1"/>
  <g fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="16" text-anchor="middle">
    <text x="390" y="138">0.2</text><text x="532" y="138">0.4</text><text x="674" y="138">0.6</text><text x="816" y="138">0.8</text><text x="1100" y="138">1.0</text>
  </g>
  <g stroke="#e2e8f0">
    <line x1="390" y1="150" x2="390" y2="650"/><line x1="532" y1="150" x2="532" y2="650"/><line x1="674" y1="150" x2="674" y2="650"/><line x1="816" y1="150" x2="816" y2="650"/><line x1="1100" y1="150" x2="1100" y2="650"/>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <text x="70" y="217" fill="#0f172a" font-size="22" font-weight="600">TREC-COVID · BM25</text>
    <text x="70" y="244" fill="#64748b" font-size="16">largest relative swing</text>
    <line x1="586" y1="220" x2="745" y2="220" stroke="#6366f1" stroke-width="14" stroke-linecap="round"/>
    <circle cx="586" cy="220" r="11" fill="#ffffff" stroke="#6366f1" stroke-width="5"/><circle cx="745" cy="220" r="11" fill="#6366f1"/>
    <text x="586" y="256" fill="#475569" font-size="17" text-anchor="middle">.476</text><text x="745" y="256" fill="#0f172a" font-size="17" font-weight="700" text-anchor="middle">.700</text>
    <rect x="930" y="195" width="138" height="50" rx="25" fill="#ede9fe"/>
    <text x="999" y="227" fill="#5b21b6" font-size="21" font-weight="700" text-anchor="middle">+47%</text>

    <text x="70" y="347" fill="#0f172a" font-size="22" font-weight="600">FiQA · Dense OpenAI</text>
    <text x="70" y="374" fill="#64748b" font-size="16">semantic → fixed-512</text>
    <line x1="663" y1="350" x2="773" y2="350" stroke="#0ea5e9" stroke-width="14" stroke-linecap="round"/>
    <circle cx="663" cy="350" r="11" fill="#ffffff" stroke="#0ea5e9" stroke-width="5"/><circle cx="773" cy="350" r="11" fill="#0ea5e9"/>
    <text x="663" y="386" fill="#475569" font-size="17" text-anchor="middle">.585</text><text x="773" y="386" fill="#0f172a" font-size="17" font-weight="700" text-anchor="middle">.739</text>
    <rect x="930" y="325" width="138" height="50" rx="25" fill="#e0f2fe"/>
    <text x="999" y="357" fill="#0369a1" font-size="21" font-weight="700" text-anchor="middle">+26%</text>

    <text x="70" y="477" fill="#0f172a" font-size="22" font-weight="600">FiQA · Dense BGE</text>
    <text x="70" y="504" fill="#64748b" font-size="16">semantic → fixed-512</text>
    <line x1="592" y1="480" x2="729" y2="480" stroke="#14b8a6" stroke-width="14" stroke-linecap="round"/>
    <circle cx="592" cy="480" r="11" fill="#ffffff" stroke="#14b8a6" stroke-width="5"/><circle cx="729" cy="480" r="11" fill="#14b8a6"/>
    <text x="592" y="516" fill="#475569" font-size="17" text-anchor="middle">.485</text><text x="729" y="516" fill="#0f172a" font-size="17" font-weight="700" text-anchor="middle">.677</text>
    <rect x="930" y="455" width="138" height="50" rx="25" fill="#ccfbf1"/>
    <text x="999" y="487" fill="#0f766e" font-size="21" font-weight="700" text-anchor="middle">+40%</text>

    <text x="70" y="607" fill="#0f172a" font-size="22" font-weight="600">Quora · Dense OpenAI</text>
    <text x="70" y="634" fill="#64748b" font-size="16">short-document control</text>
    <line x1="1098" y1="610" x2="1100" y2="610" stroke="#94a3b8" stroke-width="14" stroke-linecap="round"/>
    <circle cx="1098" cy="610" r="11" fill="#ffffff" stroke="#94a3b8" stroke-width="5"/><circle cx="1100" cy="610" r="11" fill="#94a3b8"/>
    <text x="1062" y="650" fill="#475569" font-size="17">.997 across chunkers</text>
  </g>
  <text x="70" y="688" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="15">Open circles indicate the minimum; filled circles indicate the maximum.</text>
</svg>

