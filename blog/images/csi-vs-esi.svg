<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Chunking and embedding sensitivity by domain</title>
  <desc id="desc">Paired horizontal bars compare CSI and ESI for twelve domains. Chunking sensitivity is higher in five domains and embedding sensitivity is higher in seven.</desc>
  <rect width="1200" height="760" rx="24" fill="#f8fafc"/>
  <text x="60" y="62" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">Which choice moves retrieval quality more?</text>
  <text x="60" y="98" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="19">Chunking Sensitivity Index (CSI) vs. Embedding Sensitivity Index (ESI)</text>
  <rect x="780" y="45" width="20" height="12" rx="6" fill="#6366f1"/><text x="810" y="57" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="16">CSI · chunking</text>
  <rect x="950" y="45" width="20" height="12" rx="6" fill="#0ea5e9"/><text x="980" y="57" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="16">ESI · embedding</text>

  <g stroke="#e2e8f0"><line x1="300" y1="130" x2="300" y2="710"/><line x1="495" y1="130" x2="495" y2="710"/><line x1="690" y1="130" x2="690" y2="710"/><line x1="885" y1="130" x2="885" y2="710"/><line x1="1080" y1="130" x2="1080" y2="710"/></g>
  <g fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="14" text-anchor="middle"><text x="300" y="124">0</text><text x="495" y="124">0.25</text><text x="690" y="124">0.50</text><text x="885" y="124">0.75</text><text x="1080" y="124">1.00</text></g>

  <g font-family="Inter,Arial,sans-serif" font-size="15">
    <g transform="translate(0,150)"><text x="280" y="20" text-anchor="end" fill="#0f172a">TREC-COVID</text><rect x="300" y="4" width="669" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="144" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,196)"><text x="280" y="20" text-anchor="end" fill="#0f172a">FiQA</text><rect x="300" y="4" width="601" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="190" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,242)"><text x="280" y="20" text-anchor="end" fill="#0f172a">ArguAna</text><rect x="300" y="4" width="564" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="264" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,288)"><text x="280" y="20" text-anchor="end" fill="#0f172a">Natural Questions</text><rect x="300" y="4" width="554" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="528" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,334)"><text x="280" y="20" text-anchor="end" fill="#0f172a">DBpedia-Entity</text><rect x="300" y="4" width="502" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="559" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,380)"><text x="280" y="20" text-anchor="end" fill="#0f172a">Legal QA</text><rect x="300" y="4" width="441" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="395" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,426)"><text x="280" y="20" text-anchor="end" fill="#0f172a">FEVER</text><rect x="300" y="4" width="377" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="614" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,472)"><text x="280" y="20" text-anchor="end" fill="#0f172a">Quora</text><rect x="300" y="4" width="297" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="668" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,518)"><text x="280" y="20" text-anchor="end" fill="#0f172a">SciFact</text><rect x="300" y="4" width="228" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="624" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,564)"><text x="280" y="20" text-anchor="end" fill="#0f172a">HotpotQA</text><rect x="300" y="4" width="174" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="682" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,610)"><text x="280" y="20" text-anchor="end" fill="#0f172a">SciDocs</text><rect x="300" y="4" width="173" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="644" height="11" rx="5" fill="#0ea5e9"/></g>
    <g transform="translate(0,656)"><text x="280" y="20" text-anchor="end" fill="#0f172a">NFCorpus</text><rect x="300" y="4" width="46" height="11" rx="5" fill="#6366f1"/><rect x="300" y="20" width="768" height="11" rx="5" fill="#0ea5e9"/></g>
  </g>
  <text x="60" y="734" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600">Chunking dominates in 5 of 12 domains; embedding choice dominates in 7.</text>
</svg>
